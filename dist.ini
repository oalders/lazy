name    = lazy
author  = Olaf Alders <olaf@wundercounter.com>
license = Artistic_2_0
copyright_holder = MaxMind, Inc.
copyright_year   = 2017

[@Author::OALDERS]
-remove = Test::Mojibake
-remove = Test::Synopsis
-remove = MojibakeTests
-remove = Test::TidyAll
Test::Portability.options = test_one_dot = 0

[Prereqs]
local::lib = 2.000024

; App::cpm v0.999.0 (released 2026-03-13) raised its minimum supported Perl
; to v5.24 per the Lyon Amendment, and v1.0.0 (2026-04-26) made that the
; stable line. The last App::cpm release that installs on Perl < 5.24 is
; 0.998003. Cap at 0.998003 on older Perls so cpan/cpanm/cpm pick a
; runnable version (GH#36).
[DynamicPrereqs]
-condition = "$]" < 5.024
-body = requires('App::cpm', '<= 0.998003');

[Prereqs / DevelopRequires]
App::perlimports = 0.000058
Perl::Critic = 1.132
Perl::Tidy = 20170521

[RemovePrereqs]
remove = Code::TidyAll
remove = Code::TidyAll::Plugin::SortLines::Naturally
remove = Code::TidyAll::Plugin::Test::Vars
remove = Code::TidyAll::Plugin::UniqueLines
remove = Parallel::ForkManager
remove = Test::Vars

[Prereqs / TestRequires]
LWP = 6.35

[Encoding]
encoding = bytes
match = .gz$

[StaticInstall]
mode = auto
