name    = lazy
author  = Olaf Alders <olaf@wundercounter.com>
license = Artistic_2_0
copyright_holder = MaxMind, Inc.
copyright_year   = 2017

[@Author::OALDERS]
-remove = Test::Mojibake
-remove = Test::Synopsis
-remove = MojibakeTests
-remove = Test::TidyAll
Test::Portability.options = test_one_dot = 0

[Prereqs]
local::lib = 2.000024

[Prereqs / DevelopRequires]
App::perlimports = 0.000058
Perl::Critic = 1.132
Perl::Tidy = 20170521

[RemovePrereqs]
remove = Code::TidyAll
remove = Code::TidyAll::Plugin::SortLines::Naturally
remove = Code::TidyAll::Plugin::Test::Vars
remove = Code::TidyAll::Plugin::UniqueLines
remove = Parallel::ForkManager
remove = Test::Vars

[Prereqs / TestRequires]
LWP = 6.35

[Encoding]
encoding = bytes
match = .gz$

[StaticInstall]
mode = auto
